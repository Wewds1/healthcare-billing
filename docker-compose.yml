services:
  db:
    image: postgres:15
    container_name: billing_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: billing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retrries: 5

  api:
    build: .
    container_name: billing_api
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: billing_streamlit
    restart: always
    depends_on:
      -api
    environment:
      -API_URL=http://api:8000
    ports:
      - "8501:8501"
    volumes:
      - .:/app
volumes:
  postgres_data: